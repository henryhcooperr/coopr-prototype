<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Hi-fi · Round 4 · COOPR · Library upgrade WIP</title>
  <meta name="viewport" content="width=1440, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- R8 baseline: Literata + Inter Tight + JetBrains Mono (T-E + ink locked 2026-04-28).
       Newsreader + Plus Jakarta retained as fallbacks for any surface still referencing them. -->
  <link href="https://fonts.googleapis.com/css2?family=Literata:opsz,ital,wght@7..72,0,400;7..72,0,500;7..72,0,600;7..72,0,700;7..72,1,400;7..72,1,500&family=Inter+Tight:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Newsreader:opsz,ital,wght@6..72,0,400;6..72,0,500;6..72,0,600;6..72,0,700;6..72,1,400;6..72,1,500&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="hifi.css" />
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #f7f5f0; font-family: 'Plus Jakarta Sans', system-ui, sans-serif; color: #1a1815; }
    #root { height: 100%; }
    /* WIP banner — make it obvious this is round 4 in flight */
    .r4-wip-banner {
      position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
      z-index: 9999; pointer-events: none;
      padding: 6px 14px; border-radius: 999px;
      background: rgba(26,24,21,0.92); color: #fdfcf9;
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase;
      box-shadow: 0 4px 14px rgba(26,24,21,0.18);
    }
  </style>
</head>
<body><!-- R8: ink monochrome is now the :root default (no data-accent needed).
       To preview a variant accent, set data-accent="clay"|"moss"|"cocoa" -->
  <div class="r4-wip-banner">Round 4 · Library upgrade in progress</div>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Data + canvas + chrome (unchanged from round 3) -->
  <script src="hifi-data.js"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="hifi-chrome.jsx"></script>
  <script type="text/babel" src="hifi-data-chrome.jsx"></script>
  <script type="text/babel" src="hifi-charts.jsx"></script>
  <script type="text/babel" src="hifi-screens.jsx"></script>
  <script type="text/babel" src="hifi-chat.jsx"></script>
  <script type="text/babel" src="hifi-tokens.jsx"></script>
  <script type="text/babel" src="hifi-shell.jsx"></script>

  <!-- Round 3 surfaces (unchanged) -->
  <script type="text/babel" src="hifi-home.jsx"></script>
  <script type="text/babel" src="hifi-home-command.jsx"></script>
  <!-- Home · vertical-rail variant (R5d). Loaded after hifi-home so it can
       reuse its HomeComposer / TodayBriefing / RecentThreads helpers. -->
  <script type="text/babel" src="hifi-home-rail.jsx"></script>
  <script type="text/babel" src="hifi-studio.jsx"></script>
  <!-- R7 cull: hifi-library.jsx + hifi-library-data.jsx unwired — only referenced by app-hifi.jsx / app-hifi-r3.jsx legacy entries (not loaded by Round 4). -->
  <script type="text/babel" src="hifi-insights-data.jsx"></script>
  <script type="text/babel" src="hifi-intel.jsx"></script>
  <script type="text/babel" src="hifi-inbox.jsx"></script>
  <!-- Round 6 · Inbox · Comments + DMs editorial parity. Replace the R1 surfaces
       defined inside hifi-inbox.jsx via app-hifi-r4 wiring. -->
  <script type="text/babel" src="hifi-inbox-comments-r2.jsx"></script>
  <script type="text/babel" src="hifi-inbox-dms-r2.jsx"></script>
  <script type="text/babel" src="hifi-more.jsx"></script>
  <!-- Round 6 · Calendar R2 surface set (Day · Month · SlotDrawer · Conflict · Empty).
       Companion to HF_Calendar (week view) in hifi-more.jsx. -->
  <script type="text/babel" src="hifi-calendar-r2.jsx"></script>
  <!-- Round 6 · Settings R2 — six full Settings surfaces.
       Coexists with the R1 connections-only HF_Settings still defined in hifi-more.jsx. -->
  <script type="text/babel" src="hifi-settings-r2.jsx"></script>
  <script type="text/babel" src="hifi-studio-r3.jsx"></script>
  <!-- Round 6 · Clip Lab · Studio sub-tab · 5 surfaces.
       Loads after hifi-studio-r3.jsx so the agent co-editor primitives are co-located. -->
  <script type="text/babel" src="hifi-cliplab.jsx"></script>
  <script type="text/babel" src="hifi-r3-audit.jsx"></script>

  <!-- Round 4 · Library upgrade (the mid-prompt work)
       hifi-r4-lib-visuals MUST load FIRST — every other R4 file reads
       window.R4PlatformCard / R4PillarDot / R4ChannelChip / R4Stat / R4Chip
       / R4ThumbBackdrop / R4ChromeLongYT / R4ChromeReelIG / R4ChromeShortTT
       / R4ChromeCarouselIG / r4FmtViews from window. -->
  <script type="text/babel" src="hifi-r4-lib-visuals.jsx"></script>
  <script type="text/babel" src="hifi-r4-lib-catalog.jsx"></script>
  <!-- Catalog grid variant must load AFTER catalog.jsx so it can reference R4CatalogChrome. -->
  <script type="text/babel" src="hifi-r4-lib-catalog-grid.jsx"></script>
  <script type="text/babel" src="hifi-r4-lib-detail.jsx"></script>
  <!-- Detail · deep analysis sections (Hook DNA, drop-offs, audience, comments, vs-cluster).
       Must load AFTER detail.jsx but order with other R4 files doesn't matter — components
       are referenced via window.R4D* at render time. -->
  <script type="text/babel" src="hifi-r4-lib-detail-analysis.jsx"></script>
  <script type="text/babel" src="hifi-r4-lib-pairing.jsx"></script>
  <script type="text/babel" src="hifi-r4-lib-patterns.jsx"></script>
  <script type="text/babel" src="hifi-r4-lib-series.jsx"></script>
  <script type="text/babel" src="hifi-r4-lib-timeline.jsx"></script>
  <script type="text/babel" src="hifi-r4-lib-compare.jsx"></script>

  <!-- Round 6 · Search · Cmd-K overlay + 3 full surfaces. Reads window.R4PillarDot
       and window.R4ChannelChip for the filter rail, so loads after all R4 visuals. -->
  <script type="text/babel" src="hifi-search.jsx"></script>

  <!-- Entry point — extends app-hifi-r3 with a new R4 Library section -->
  <script type="text/babel" src="app-hifi-r4.jsx"></script>
</body>
</html>
