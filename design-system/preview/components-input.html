<!doctype html>
<html><head><meta charset="utf-8"><title>Components · Input + Composer</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--surface-1);font-family:var(--font-sans);color:var(--fg-primary)}
  .wrap{padding:22px 28px;display:flex;flex-direction:column;gap:14px}
  .input{height:36px;padding:0 12px;background:#fefdf9;border:1px solid #d8d3c4;border-radius:8px;font-size:13px;color:#1a1815;display:flex;align-items:center;font-family:inherit}
  .input.focus{border-color:#5a371f;box-shadow:0 0 0 3px rgba(90,55,31,.15)}
  .composer{background:#fefdf9;border:1px solid #d8d3c4;border-radius:16px;padding:14px 16px;display:flex;align-items:center;gap:12px}
  .composer .ph{flex:1;font-family:var(--font-serif);font-style:italic;font-size:15px;color:#8a8782}
  .send{width:28px;height:28px;border-radius:50%;background:#5a371f;color:#fdfcf9;display:inline-flex;align-items:center;justify-content:center;font-size:14px}
  .key{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:10.5px;color:#8a8782;letter-spacing:.04em}
  .key i{display:inline-flex;align-items:center;justify-content:center;height:18px;min-width:18px;padding:0 4px;border:1px solid #ebe7dc;background:#f5f3ec;border-radius:3px;font-style:normal;font-size:10px;color:#5c5a55}
  .lbl{font-family:var(--font-mono);font-size:10px;color:var(--fg-tertiary);text-transform:uppercase;letter-spacing:.1em;font-weight:600}
</style></head>
<body><div class="wrap">
  <div class="lbl">Input · default · focus</div>
  <div class="input">Hook test — eight breaths…</div>
  <div class="input focus">Hook test — eight breaths…</div>
  <div class="lbl">Composer · hero</div>
  <div class="composer"><span class="ph">Ask Coopr to draft, score, or pull a quote.</span><span class="key"><i>⌘</i><i>K</i></span><span class="send">↑</span></div>
</div></body></html>
