<!doctype html>
<html><head><meta charset="utf-8"><title>Brand · Iconography</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--surface-1);font-family:var(--font-sans);color:var(--fg-primary)}
  .wrap{padding:22px 28px;display:flex;flex-direction:column;gap:14px}
  .row{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
  .ico{width:36px;height:36px;display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--border-subtle);border-radius:8px;background:var(--surface-1);color:var(--fg-primary)}
  .ico svg{width:18px;height:18px}
  .lbl{font-family:var(--font-mono);font-size:10px;color:var(--fg-tertiary);text-transform:uppercase;letter-spacing:.1em;font-weight:600;width:120px}
  .note{font-family:var(--font-serif);font-style:italic;font-size:13px;color:var(--fg-tertiary);max-width:60ch;line-height:1.5}
</style></head>
<body><div class="wrap">
  <div class="row"><span class="lbl">Inline SVG · 1.5 stroke</span>
    <span class="ico"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 7l6-5 6 5v7H2z"/></svg></span>
    <span class="ico"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="2" width="10" height="12" rx="1"/><path d="M5.5 5h5M5.5 8h5M5.5 11h3"/></svg></span>
    <span class="ico"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="4" width="12" height="8" rx="1"/><path d="M6 4v8M10 4v8"/></svg></span>
    <span class="ico"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 13l4-6 3 4 5-7"/></svg></span>
    <span class="ico"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="7" r="5"/><path d="M14 14l-3-3"/></svg></span>
    <span class="ico"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 3h10v10H3z"/><path d="M3 7h10M7 3v10"/></svg></span>
    <span class="ico"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4h12M2 8h12M2 12h8"/></svg></span>
  </div>
  <div class="note">Inline SVG only · 1.5px stroke · 16/20 viewbox · no icon font · no emoji · no Magic / sparkle / star / wand · no skeuomorphism.</div>
</div></body></html>
