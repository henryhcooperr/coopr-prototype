<!doctype html>
<html><head><meta charset="utf-8"><title>Type · Headline</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--surface-1);font-family:var(--font-sans);color:var(--fg-primary)}
  .wrap{padding:28px 32px}
  .eyebrow{font-family:var(--font-mono);font-size:10.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--fg-tertiary);margin-bottom:14px}
  .headline{font-family:var(--font-serif);font-style:italic;font-weight:600;font-size:44px;line-height:1.06;letter-spacing:-.035em;color:var(--fg-primary);margin:0}
  .tail{color:var(--fg-tertiary)}
  .meta{margin-top:14px;display:flex;gap:18px;font-family:var(--font-mono);font-size:10.5px;color:var(--fg-tertiary);letter-spacing:.06em;text-transform:uppercase}
</style></head>
<body><div class="wrap">
  <div class="eyebrow">Insights · Overview · Last 30 Days</div>
  <h1 class="headline">+22% saves, +12% views. <span class="tail">One channel is going backwards.</span></h1>
  <div class="meta"><span>Literata Italic 600 · 44px / 1.06 · −0.035em</span></div>
</div></body></html>
