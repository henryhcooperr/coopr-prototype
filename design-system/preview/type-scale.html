<!doctype html>
<html><head><meta charset="utf-8"><title>Type · Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--surface-1);font-family:var(--font-sans);color:var(--fg-primary)}
  .wrap{padding:24px 32px}
  .row{display:grid;grid-template-columns:90px 1fr 200px;gap:20px;align-items:baseline;padding:8px 0;border-bottom:1px solid var(--border-subtle)}
  .row:last-child{border-bottom:none}
  .tag{font-family:var(--font-mono);font-size:10.5px;color:var(--fg-tertiary);text-transform:uppercase;letter-spacing:.08em}
  .lit{font-family:var(--font-serif);font-style:italic;font-weight:600;letter-spacing:-.03em;color:var(--fg-primary)}
  .meta{font-family:var(--font-mono);font-size:10.5px;color:var(--fg-tertiary);letter-spacing:.06em;text-transform:uppercase;text-align:right}
</style></head>
<body><div class="wrap">
  <div class="row"><span class="tag">H1 · 4xl</span><span class="lit" style="font-size:48px;line-height:1.05">The drafting set.</span><span class="meta">48 / 1.05</span></div>
  <div class="row"><span class="tag">H2 · 3xl</span><span class="lit" style="font-size:36px;line-height:1.08">Two pillars carry it.</span><span class="meta">36 / 1.08</span></div>
  <div class="row"><span class="tag">H3 · 2xl</span><span class="lit" style="font-size:28px;line-height:1.15">A few in motion.</span><span class="meta">28 / 1.15</span></div>
  <div class="row"><span class="tag">H4 · xl</span><span class="lit" style="font-size:22px;line-height:1.25">Indexed, not shaped.</span><span class="meta">22 / 1.25</span></div>
</div></body></html>
