<!doctype html>
<html><head><meta charset="utf-8"><title>Components · Topbar</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--bg-base);font-family:var(--font-sans);color:var(--fg-primary)}
  .topbar{height:52px;padding:0 24px;display:flex;align-items:center;border-bottom:1px solid #ebe7dc;background:#fefdf9;gap:24px}
  .logo{width:24px;height:24px;border-radius:4px;background:#1a1815;color:#f1efe9;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;letter-spacing:.02em;font-family:var(--font-sans)}
  .tab{height:52px;display:inline-flex;align-items:center;font-size:13px;font-weight:500;color:#5c5a55;border-bottom:2px solid transparent;margin-bottom:-1px}
  .tab.active{color:#1a1815;font-weight:600;border-bottom-color:#1a1815}
  .spacer{flex:1}
  .cmdk{height:30px;padding:0 10px;display:inline-flex;align-items:center;gap:8px;border:1px solid #ebe7dc;border-radius:8px;background:#f5f3ec;font-size:12px;color:#8a8782;font-family:var(--font-mono);letter-spacing:.04em}
  .key{display:inline-flex;align-items:center;justify-content:center;height:18px;min-width:18px;padding:0 4px;border-radius:3px;background:#fefdf9;border:1px solid #ebe7dc;font-size:10.5px;color:#5c5a55}
  .avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#c98b6b,#8c5a3d);border:1px solid #d8d3c4}
  .subtabs{height:42px;padding:0 24px;display:flex;align-items:center;border-bottom:1px solid #ebe7dc;background:#fefdf9;gap:24px}
  .sub{font-family:var(--font-mono);font-size:10.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#8a8782;height:42px;display:inline-flex;align-items:center;border-bottom:2px solid transparent;margin-bottom:-1px}
  .sub.active{color:#1a1815;border-bottom-color:#1a1815}
</style></head>
<body>
  <div class="topbar">
    <span class="logo">C</span>
    <span class="tab active">Home</span>
    <span class="tab">Docs</span>
    <span class="tab">Clip Lab</span>
    <span class="tab">Library</span>
    <span class="tab">Insights</span>
    <span class="spacer"></span>
    <span class="cmdk">Search · ask Coopr<span class="key">⌘</span><span class="key">K</span></span>
    <span class="avatar"></span>
  </div>
  <div class="subtabs">
    <span class="sub active">Overview</span>
    <span class="sub">Threads</span>
    <span class="sub">Activity</span>
  </div>
</body></html>
