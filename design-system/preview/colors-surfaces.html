<!doctype html>
<html><head><meta charset="utf-8"><title>Colors · Surfaces</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--bg-base);font-family:var(--font-sans);color:var(--fg-primary)}
  .wrap{padding:18px 20px;display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
  .sw{border:1px solid var(--border-subtle);border-radius:var(--radius-md);overflow:hidden}
  .chip{height:74px}
  .meta{padding:10px 12px;font-family:var(--font-mono);font-size:10px;color:var(--fg-secondary);letter-spacing:.04em;line-height:1.4}
  .meta b{display:block;color:var(--fg-primary);font-weight:600;font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px}
</style></head>
<body><div class="wrap">
  <div class="sw"><div class="chip" style="background:#fbfaf6"></div><div class="meta"><b>bg-base</b>#fbfaf6</div></div>
  <div class="sw"><div class="chip" style="background:#fefdf9"></div><div class="meta"><b>surface-1</b>#fefdf9</div></div>
  <div class="sw"><div class="chip" style="background:#f5f3ec"></div><div class="meta"><b>surface-2</b>#f5f3ec</div></div>
  <div class="sw"><div class="chip" style="background:#ece9df"></div><div class="meta"><b>surface-3</b>#ece9df</div></div>
  <div class="sw"><div class="chip" style="background:#1a1815"></div><div class="meta"><b>surface-ink</b>#1a1815</div></div>
</div></body></html>
