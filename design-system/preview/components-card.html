<!doctype html>
<html><head><meta charset="utf-8"><title>Components · Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--bg-base);font-family:var(--font-sans);color:var(--fg-primary)}
  .wrap{padding:22px 28px;display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .card{background:#fefdf9;border:1px solid #ebe7dc;border-radius:12px;padding:18px;display:flex;flex-direction:column;gap:10px}
  .eb{font-family:var(--font-mono);font-size:10px;color:#8a8782;text-transform:uppercase;letter-spacing:.1em;font-weight:600}
  .lit{font-family:var(--font-serif);font-style:italic;font-weight:600;font-size:22px;letter-spacing:-.02em;line-height:1.15;color:#1a1815;margin:0}
  .tail{color:#8a8782}
  .meta{display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:10.5px;color:#8a8782;letter-spacing:.04em;margin-top:auto}
  .pill{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:10px;color:#371e13;text-transform:uppercase;letter-spacing:.08em;font-weight:600;background:#e8dcc8;padding:3px 8px;border-radius:4px}
  .dot{width:6px;height:6px;border-radius:50%;background:currentColor}
</style></head>
<body><div class="wrap">
  <div class="card"><span class="eb">Truk Lagoon · Ep. 1 Hook</span><h3 class="lit">Eight-breaths phrase. <span class="tail">Should land twice.</span></h3><div class="meta"><span class="pill"><span class="dot"></span>Drafting · v3</span><span>4D AGO</span></div></div>
  <div class="card"><span class="eb">Insights · Format DNA</span><h3 class="lit">Safety + story carry it. <span class="tail">64% of yield.</span></h3><div class="meta"><span class="pill" style="background:#e8e2d1;color:#5a4a26">Indexed</span><span>SINCE MON 09:00</span></div></div>
</div></body></html>
