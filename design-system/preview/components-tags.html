<!doctype html>
<html><head><meta charset="utf-8"><title>Components · Tags</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--surface-1);font-family:var(--font-sans);color:var(--fg-primary)}
  .wrap{padding:24px 28px;display:flex;flex-direction:column;gap:14px}
  .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .lbl{font-family:var(--font-mono);font-size:10px;color:var(--fg-tertiary);text-transform:uppercase;letter-spacing:.1em;width:90px;font-weight:600}
  .tag{display:inline-flex;align-items:center;gap:6px;height:22px;padding:0 8px;border-radius:4px;background:#f5f3ec;border:1px solid #ebe7dc;font-size:11.5px;font-weight:500;color:#5c5a55}
  .tag.accent{background:#e8dcc8;border-color:transparent;color:#371e13}
  .tag.success{background:#e8e2d1;border-color:transparent;color:#5a4a26}
  .tag.warning{background:#f0e3d4;border-color:transparent;color:#a07346}
  .tag.info{background:#ece4dc;border-color:transparent;color:#806750}
  .tag.danger{background:#eed8d0;border-color:transparent;color:#7a3a24}
  .dot{width:6px;height:6px;border-radius:50%;background:currentColor}
</style></head>
<body><div class="wrap">
  <div class="row"><span class="lbl">Default</span><span class="tag">Hook test</span><span class="tag">Shot list</span><span class="tag">v3</span></div>
  <div class="row"><span class="lbl">Accent</span><span class="tag accent"><span class="dot"></span>Active</span><span class="tag accent">Pinned</span></div>
  <div class="row"><span class="lbl">Tones</span><span class="tag success">Shipped</span><span class="tag warning">Approaching</span><span class="tag info">Indexed</span><span class="tag danger">Over limit</span></div>
</div></body></html>
