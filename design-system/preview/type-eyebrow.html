<!doctype html>
<html><head><meta charset="utf-8"><title>Type · Eyebrow & Dateline</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--surface-1);font-family:var(--font-sans);color:var(--fg-primary)}
  .wrap{padding:24px 32px}
  .strip{display:flex;justify-content:space-between;align-items:baseline;padding:14px 0;border-top:1px solid var(--fg-primary);border-bottom:1px solid var(--border-subtle)}
  .strip + .strip{margin-top:18px}
  .eb{font-family:var(--font-mono);font-size:10.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--fg-tertiary)}
  .dl{font-family:var(--font-mono);font-size:11px;color:var(--fg-tertiary);letter-spacing:.04em}
  .ann{margin-top:10px;font-family:var(--font-mono);font-size:10px;color:var(--fg-tertiary);letter-spacing:.06em;text-transform:uppercase}
</style></head>
<body><div class="wrap">
  <div class="strip"><span class="eb">Insights · Overview · Last 30 Days</span><span class="dl">3 PLATFORMS · 47 POSTS INDEXED</span></div>
  <div class="strip"><span class="eb">Truk Lagoon · Ep. 1 Hook</span><span class="dl">SINCE MON 09:00 · +1.4K FOLLOWERS</span></div>
  <div class="strip"><span class="eb">Docs · 7 Projects</span><span class="dl">4D AGO</span></div>
  <div class="ann">eyebrow: mono 600 caps · 0.10em &nbsp;·&nbsp; dateline: mono regular · 0.04em</div>
</div></body></html>
