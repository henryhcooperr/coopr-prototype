<!doctype html>
<html><head><meta charset="utf-8"><title>Spacing · Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--surface-1);font-family:var(--font-sans);color:var(--fg-primary)}
  .wrap{padding:22px 28px;display:flex;flex-direction:column;gap:8px}
  .row{display:grid;grid-template-columns:80px 1fr 70px;gap:14px;align-items:center}
  .lbl{font-family:var(--font-mono);font-size:11px;color:var(--fg-tertiary);text-transform:uppercase;letter-spacing:.08em}
  .bar{height:10px;background:var(--accent-primary);border-radius:2px}
  .px{font-family:var(--font-mono);font-size:11px;color:var(--fg-secondary);text-align:right}
</style></head>
<body><div class="wrap">
  <div class="row"><span class="lbl">space-1</span><div class="bar" style="width:4px"></div><span class="px">4 px</span></div>
  <div class="row"><span class="lbl">space-2</span><div class="bar" style="width:8px"></div><span class="px">8 px</span></div>
  <div class="row"><span class="lbl">space-3</span><div class="bar" style="width:12px"></div><span class="px">12 px</span></div>
  <div class="row"><span class="lbl">space-4</span><div class="bar" style="width:16px"></div><span class="px">16 px</span></div>
  <div class="row"><span class="lbl">space-5</span><div class="bar" style="width:24px"></div><span class="px">24 px</span></div>
  <div class="row"><span class="lbl">space-6</span><div class="bar" style="width:32px"></div><span class="px">32 px</span></div>
  <div class="row"><span class="lbl">space-8</span><div class="bar" style="width:48px"></div><span class="px">48 px</span></div>
  <div class="row"><span class="lbl">space-12</span><div class="bar" style="width:72px"></div><span class="px">72 px</span></div>
</div></body></html>
