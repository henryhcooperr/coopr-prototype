<!doctype html>
<html><head><meta charset="utf-8"><title>Colors · Accent (Cocoa)</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--surface-1);font-family:var(--font-sans);color:var(--fg-primary)}
  .wrap{padding:18px 22px;display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
  .sw{border:1px solid var(--border-subtle);border-radius:var(--radius-md);overflow:hidden}
  .chip{height:64px}
  .meta{padding:8px 10px;font-family:var(--font-mono);font-size:10px;color:var(--fg-secondary);letter-spacing:.04em;line-height:1.4}
  .meta b{display:block;color:var(--fg-primary);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px}
  .note{grid-column:1/-1;margin-top:6px;font-family:var(--font-serif);font-style:italic;font-size:14px;color:var(--fg-tertiary);letter-spacing:-.01em}
</style></head>
<body><div class="wrap">
  <div class="sw"><div class="chip" style="background:#5a371f"></div><div class="meta"><b>primary</b>#5a371f</div></div>
  <div class="sw"><div class="chip" style="background:#48291a"></div><div class="meta"><b>hover</b>#48291a</div></div>
  <div class="sw"><div class="chip" style="background:#371e13"></div><div class="meta"><b>press</b>#371e13</div></div>
  <div class="sw"><div class="chip" style="background:#e8dcc8"></div><div class="meta"><b>soft</b>#e8dcc8</div></div>
  <div class="sw"><div class="chip" style="background:#5b7a4c"></div><div class="meta"><b>moss alt</b>#5b7a4c</div></div>
  <div class="note">Single Hue Depth — cocoa is the only saturated hue. Moss is opt-in via <code style="font-family:var(--font-mono);font-size:11px">[data-accent="moss"]</code>.</div>
</div></body></html>
