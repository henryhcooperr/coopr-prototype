<!doctype html>
<html><head><meta charset="utf-8"><title>Brand · Library Imagery</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--surface-1);font-family:var(--font-sans);color:var(--fg-primary)}
  .wrap{padding:18px 22px;display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
  .card{display:flex;flex-direction:column;gap:6px}
  .img{width:100%;aspect-ratio:4/5;background-size:cover;background-position:center;border-radius:6px;border:1px solid var(--border-subtle)}
  .eb{font-family:var(--font-mono);font-size:9.5px;color:var(--fg-tertiary);text-transform:uppercase;letter-spacing:.08em;font-weight:600}
  .ti{font-family:var(--font-serif);font-style:italic;font-weight:600;font-size:13px;letter-spacing:-.015em;color:var(--fg-primary);line-height:1.15}
</style></head>
<body><div class="wrap">
  <div class="card"><div class="img" style="background-image:url(../assets/library-thumbs/0036.jpg)"></div><span class="eb">Ep. 12</span><span class="ti">Truk Lagoon</span></div>
  <div class="card"><div class="img" style="background-image:url(../assets/library-thumbs/0038.jpg)"></div><span class="eb">Ep. 11</span><span class="ti">Cold Door</span></div>
  <div class="card"><div class="img" style="background-image:url(../assets/library-thumbs/0040.jpg)"></div><span class="eb">Ep. 10</span><span class="ti">Eight Breaths</span></div>
  <div class="card"><div class="img" style="background-image:url(../assets/library-thumbs/0042.jpg)"></div><span class="eb">Ep. 09</span><span class="ti">Sloop Run</span></div>
  <div class="card"><div class="img" style="background-image:url(../assets/library-thumbs/0044.jpg)"></div><span class="eb">Ep. 08</span><span class="ti">Pillar Two</span></div>
</div></body></html>
