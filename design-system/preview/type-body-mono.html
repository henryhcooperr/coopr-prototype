<!doctype html>
<html><head><meta charset="utf-8"><title>Type · Body & Mono</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--surface-1);font-family:var(--font-sans);color:var(--fg-primary)}
  .wrap{padding:24px 32px;display:grid;grid-template-columns:1fr 1fr;gap:32px}
  .lbl{font-family:var(--font-mono);font-size:10.5px;font-weight:600;color:var(--fg-tertiary);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
  .body{font-family:var(--font-sans);font-size:14.5px;line-height:1.55;color:var(--fg-secondary);max-width:60ch;margin:0}
  .mono{font-family:var(--font-mono);font-size:11px;color:var(--fg-secondary);letter-spacing:.02em;line-height:1.6}
  .mono b{font-weight:600;color:var(--fg-primary)}
</style></head>
<body><div class="wrap">
  <div>
    <div class="lbl">Inter Tight · Body 14.5/1.55</div>
    <p class="body">YouTube carries the volume; TikTok cadence collapsed; Instagram is flat. Two pillars (safety + story) account for 64% of yield.</p>
  </div>
  <div>
    <div class="lbl">JetBrains Mono · Captions, Datelines, Numerals</div>
    <div class="mono">SINCE MON 09:00 · +1.4K FOLLOWERS<br/>4D AGO · DRAFTING · V3<br/><b>1,842 / 2,400</b> · <b>+340%</b> saves · <b>00:18</b></div>
  </div>
</div></body></html>
