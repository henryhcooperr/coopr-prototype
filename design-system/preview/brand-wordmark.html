<!doctype html>
<html><head><meta charset="utf-8"><title>Brand · Wordmark</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--bg-base);font-family:var(--font-sans);color:var(--fg-primary);display:flex;align-items:center;justify-content:center;min-height:240px}
  .wrap{display:flex;flex-direction:column;align-items:center;gap:18px}
  .row{display:flex;align-items:center;gap:30px}
  .mark{width:56px;height:56px;border-radius:8px;background:#1a1815;color:#f1efe9;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:24px;letter-spacing:.02em}
  .word{font-family:var(--font-sans);font-weight:700;font-size:42px;letter-spacing:.02em;color:#1a1815}
  .small{display:flex;gap:18px;align-items:center}
  .small .mark{width:24px;height:24px;font-size:11px;border-radius:4px}
  .small .word{font-size:14px}
  .lbl{font-family:var(--font-mono);font-size:10px;color:#8a8782;text-transform:uppercase;letter-spacing:.1em;font-weight:600}
</style></head>
<body><div class="wrap">
  <div class="lbl">Brand mark + wordmark</div>
  <div class="row"><span class="mark">C</span><span class="word">COOPR</span></div>
  <div class="small"><span class="mark">C</span><span class="word">COOPR</span><span class="lbl">topbar size · 24px</span></div>
</div></body></html>
